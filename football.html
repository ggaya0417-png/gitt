<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Football Scoreboard Pro</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    color:white;
}

.scoreboard{
    background:#111;
    padding:20px;
    border-radius:15px;
    width:600px;
    text-align:center;
}

.teams{
    display:flex;
    justify-content:space-between;
    margin-top:20px;
}

.team{
    width:48%;
    background:#222;
    padding:15px;
    border-radius:10px;
}

.score{
    font-size:40px;
    margin:10px 0;
}

button{
    margin:5px;
    padding:5px 10px;
    cursor:pointer;
}

select,input{
    margin:5px;
    padding:5px;
}

#matchTime{
    font-size:35px;
    color:yellow;
}

ul{
    text-align:left;
    max-height:150px;
    overflow:auto;
}
</style>
</head>

<body>

<div class="scoreboard">

<h1>Football Match</h1>
<h2 id="matchTime">00:00</h2>
<p id="matchStatus">Not Started</p>

<button onclick="startMatch()">Start Match</button>
<button onclick="startExtraTime()">Start Extra Time</button>
<button onclick="resetMatch()">Reset</button>

<div class="teams">

<!-- TEAM A -->
<div class="team">
<h2>Team A</h2>
<p class="score" id="score1">0</p>

<input type="text" id="newPlayer1" placeholder="Add Player">
<button onclick="addPlayer(1)">Add</button>

<br>

<select id="players1">
<option value="">Select Player</option>
</select>

<br>

<button onclick="addGoal(1)">Goal</button>
<button onclick="addCard(1,'Yellow')">Yellow</button>
<button onclick="addCard(1,'Red')">Red</button>

<p>🟨 <span id="yellow1">0</span> | 🟥 <span id="red1">0</span></p>
</div>

<!-- TEAM B -->
<div class="team">
<h2>Team B</h2>
<p class="score" id="score2">0</p>

<input type="text" id="newPlayer2" placeholder="Add Player">
<button onclick="addPlayer(2)">Add</button>

<br>

<select id="players2">
<option value="">Select Player</option>
</select>

<br>

<button onclick="addGoal(2)">Goal</button>
<button onclick="addCard(2,'Yellow')">Yellow</button>
<button onclick="addCard(2,'Red')">Red</button>

<p>🟨 <span id="yellow2">0</span> | 🟥 <span id="red2">0</span></p>
</div>

</div>

<h3>Match History</h3>
<ul id="history"></ul>

</div>

<script>

// SCORE VARIABLES
let score1=0, score2=0;
let yellow1=0,yellow2=0;
let red1=0,red2=0;

// TIMER VARIABLES
let minutes=0;
let seconds=0;
let timer=null;
let half=1;
let isBreak=false;
let extraTime=false;

// ADD PLAYER
function addPlayer(team){
let input=document.getElementById("newPlayer"+team);
let name=input.value.trim();
if(name==="") return alert("Enter player name");

let option=document.createElement("option");
option.value=name;
option.textContent=name;

document.getElementById("players"+team).appendChild(option);
input.value="";
}

// START MATCH
function startMatch(){
if(timer!==null) return;

document.getElementById("matchStatus").innerText="First Half";

timer=setInterval(runTimer,1000);
}

// RUN TIMER
function runTimer(){

seconds++;

if(seconds===60){
minutes++;
seconds=0;
}

updateDisplay();

// HALF TIME AT 45
if(minutes===45 && half===1){
clearInterval(timer);
timer=null;
startBreak();
}
}

// HALF TIME BREAK (15 seconds demo instead 15 mins real)
function startBreak(){
isBreak=true;
document.getElementById("matchStatus").innerText="Half Time Break";

let breakTime=15; // demo (change to 900 for real 15 mins)

let breakTimer=setInterval(()=>{
breakTime--;
document.getElementById("matchTime").innerText="Break: "+breakTime;

if(breakTime===0){
clearInterval(breakTimer);
half=2;
isBreak=false;
document.getElementById("matchStatus").innerText="Second Half";
timer=setInterval(runTimer,1000);
}
},1000);
}

// EXTRA TIME
function startExtraTime(){
if(minutes<90){
alert("Match not finished yet");
return;
}

extraTime=true;
document.getElementById("matchStatus").innerText="Extra Time";
if(timer===null)
timer=setInterval(runTimer,1000);
}

// UPDATE DISPLAY
function updateDisplay(){
let m=minutes<10?"0"+minutes:minutes;
let s=seconds<10?"0"+seconds:seconds;

if(extraTime && minutes>=90){
document.getElementById("matchTime").innerText="90+"+(minutes-90)+"'";
}
else{
document.getElementById("matchTime").innerText=m+":"+s;
}

// FULL TIME AT 90
if(minutes===90 && !extraTime){
clearInterval(timer);
timer=null;
document.getElementById("matchStatus").innerText="Full Time";
}
}

// ADD GOAL
function addGoal(team){

let select=document.getElementById("players"+team);
let player=select.value;
if(player==="") return alert("Select player");

let timeText = minutes>=90 ? "90+"+(minutes-90)+"'" : minutes+"'";

if(team===1){
score1++;
document.getElementById("score1").innerText=score1;
}
else{
score2++;
document.getElementById("score2").innerText=score2;
}

addHistory(timeText+" - "+player+" scored (Team "+team+")");
}

// ADD CARD
function addCard(team,type){

let select=document.getElementById("players"+team);
let player=select.value;
if(player==="") return alert("Select player");

if(team===1){
if(type==="Yellow"){yellow1++; document.getElementById("yellow1").innerText=yellow1;}
else{red1++; document.getElementById("red1").innerText=red1;}
}
else{
if(type==="Yellow"){yellow2++; document.getElementById("yellow2").innerText=yellow2;}
else{red2++; document.getElementById("red2").innerText=red2;}
}

let timeText = minutes>=90 ? "90+"+(minutes-90)+"'" : minutes+"'";

addHistory(timeText+" - "+player+" got "+type+" Card (Team "+team+")");
}

// ADD HISTORY
function addHistory(text){
let li=document.createElement("li");
li.innerText=text;
document.getElementById("history").appendChild(li);
}

// RESET MATCH
function resetMatch(){
clearInterval(timer);
timer=null;

score1=score2=0;
yellow1=yellow2=0;
red1=red2=0;
minutes=seconds=0;
half=1;
extraTime=false;

document.getElementById("score1").innerText=0;
document.getElementById("score2").innerText=0;
document.getElementById("yellow1").innerText=0;
document.getElementById("yellow2").innerText=0;
document.getElementById("red1").innerText=0;
document.getElementById("red2").innerText=0;
document.getElementById("history").innerHTML="";
document.getElementById("matchTime").innerText="00:00";
document.getElementById("matchStatus").innerText="Not Started";
}

</script>

</body>
</html>
