<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Users Cards</title>

<style>
body{
    margin:0;
    min-height:100vh;
    background:url("users.jpg") center/cover no-repeat;
    font-family:Segoe UI, Arial, sans-serif;
}

.container{
    width:100%;
    min-height:100vh;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    align-items:center;
    gap:20px;
    padding:20px;
    transition:filter 0.4s ease;
}

.container.blur{
    filter:blur(6px);
}

.card{
    width:200px;
    height:350px;
    background:#baddee;
    border-radius:12px;
    padding:10px;
    text-align:center;
    cursor:pointer;
    box-shadow:0 6px 15px rgba(0,0,0,0.15);
    transition:0.3s ease;
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 12px 25px rgba(0,0,0,0.25);
}

.card img{
    width:120px;
    height:120px;
    object-fit:cover;
    border-radius:12px;
    display:block;
    margin:12px auto;
    transition:0.4s ease;
}

.card:hover img{
    border-radius:50%;
    transform:scale(1.08);
}

.card h3,h4,h5,h6{
    margin:8px 0;
    font-size:16px;
}

.popupm{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    align-items:center;
    justify-content:center;
}

.popupm.show{
    display:flex;
}

.popupcon{
    width:600px;
    background:#e1a8a8;
    padding:25px;
    border-radius:16px;
    text-align:center;
    position:relative;
    transform:scale(0.85);
    opacity:0;
    transition:all 0.4s ease;
}

.popupm.show .popupcon{
    transform:scale(1);
    opacity:1;
}

.boxclose{
    position:absolute;
    top:12px;
    right:15px;
    cursor:pointer;
    background:#eee;
    padding:5px 10px;
    border-radius:6px;
    font-weight:bold;
}

.popupcon img{
    width:240px;
    height:240px;
    object-fit:cover;
    border-radius:14px;
    display:block;
    margin:15px auto;
}

@media(max-width:768px){
    .popupcon{
        width:90%;
    }
}
</style>
</head>

<body>
<input 
  type="text" 
  id="searchInput" 
  placeholder="Search by first name..." 
  onkeyup="searchUser()"
  style="
    padding:10px;
    width:250px;
    border-radius:8px;
    border:none;
    margin:20px auto;
    display:block;
    outline:none;
  ">
<div class="container" id="products"></div>

<div class="popupm" id="pop" onclick="outsideClose(event)">
    <div class="popupcon">
        <span class="boxclose" onclick="closepop()">X</span>
        <img id="imgp">
        <h3 id="idp"></h3>
        <h4 id="fnp"></h4>
        <h5 id="lnp"></h5>
        <h6 id="agep"></h6>
    </div>
</div>

<script>
let productsData=[];

function genUI(data){
    let box=document.getElementById("products");
    box.innerHTML="";

    data.forEach(item=>{
        let card=document.createElement("div");
        card.className="card";

        card.innerHTML=`
            <img src="${item.image}">
            <h4>Firstname: ${item.firstName}</h4>
            <h6>Lastname: ${item.lastName}</h6>
            <h5>Age: ${item.age}</h5>
            <h3>Id: ${item.id}</h3>
        `;

        card.onclick=function(){
            document.getElementById("imgp").src=item.image;
            document.getElementById("idp").innerText="Id: "+item.id;
            document.getElementById("fnp").innerText="Firstname: "+item.firstName;
            document.getElementById("lnp").innerText="Lastname: "+item.lastName;
            document.getElementById("agep").innerText="Age: "+item.age;

            document.getElementById("pop").classList.add("show");
            document.querySelector(".container").classList.add("blur");
        };

        box.appendChild(card);
    });
}
function searchUser(){
    let value = document.getElementById("searchInput").value.toLowerCase();

    let filteredData = productsData.filter(user =>
        user.firstName.toLowerCase().includes(value)
    );

    genUI(filteredData);
}
function closepop(){
    document.getElementById("pop").classList.remove("show");
    document.querySelector(".container").classList.remove("blur");
}

function outsideClose(e){
    if(e.target.id==="pop"){
        closepop();
    }
}

fetch("https://dummyjson.com/users")
.then(res=>res.json())
.then(data=>{
    productsData=data.users;
    genUI(productsData);
});
</script>

</body>
</html>
