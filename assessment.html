<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            width:100%;
            height:100%;
            display:flex;
            flex-wrap:wrap;
            justify-content:space-around;
            align-items:center;
            background-color:gray;
            gap:20px;
            padding:10px;
        }
        .card{
            width:200px;
            height:350px;
            background-color:rgb(186, 221, 238);
            border-radius:10px;
            justify-content: space-evenly;
        }
        /* .card img {
        margin-top:30px;
         width: 100%;
        height: 200px;
        } */
     .card p {
    margin-top: 10px;
    font-size: 14px;
    text-align:center;
    font-weight: bold;
    font-size: 18px;
     }    
     .popupm{
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.6); 
    display:none;
    position:absolute; 
     top:0;
    left:0;
} 
.card h3,h4,h5,h6{
    text-align:center;
    font-size: 18px;
    margin: 30px;
}

.popupcon{
    width:700px;
    height:450px;
    border:3px solid black;
    background:rgb(225, 168, 168);
    margin:80px auto;  
    padding-top:40px;
    position:relative;
}
.boxclose{
    width:25px;
    height:25px;
    background:#ccc;
    box-shadow:2px 2px 2px 2px gray;
    border-radius: 2px;
    position:absolute;
    top:10px;
    right:10px;
    text-align:center;
    padding-top: 5px;
    font-weight:bold;
}
.popupcon img {
  width:300px;
  height:300px;
  margin-bottom: 40px;
}
.popupcon h3{
    font-size:30px;
    text-align: center;
}
.parent{
    opacity:0.8;
}
@media(max-width:768px){
    .popupcon{
        width:500px;
        height:450px;
        display:block;
    }
}
     </style>
</head>
<body>
    <div class="container" id="products"></div>
    <div class="popupm" id="pop">
        <div class="popupcon">
        <div class="parent"> <span class="boxclose" onclick="closepop()">X</span></div>
        <h3 id="idp"></h3>
        <h4 id="fnp"></h4>
        <h5 id="lnp"></h5>
        <h6 id="agep"></h6>
</div>
        </div>
    <script>
        productsData=[];
        function genUI(data){
            var box = document.getElementById("products");
           box.innerHTML = "";
           data.forEach(function(item){
               var card=document.createElement("div");
               card.className="card";
               var id=document.createElement("h3");
               id.innerHTML="Id:" +item.id;
               var fn=document.createElement("h4");
               fn.innerHTML="Firstname:" +item.firstName;
               var age=document.createElement("h5");
               age.innerText="Age:" +item.age;
               var ln=document.createElement("h6");
               ln.innerHTML="Lastname:"+item.lastName;
               card.appendChild(fn);
               card.appendChild(ln)
               card.appendChild(age);
               card.appendChild(id);
               box.appendChild(card);
               card.onclick=function(){
                  document.getElementById("idp").innerHTML="Id:" +item.id;
                  document.getElementById("fnp").innerHTML="Firstname:" +item.firstName;
                   document.getElementById("lnp").innerHTML="Lastname:"+item.lastName;
                   document.getElementById("agep").innerHTML="Age:" +item.age;
                 document.getElementById("pop").style.display="block";
               }
          });
        }
              function closepop(){
                  document.getElementById("pop").style.display="none";
                  }
        fetch("https://dummyjson.com/users")
       .then(function(res){ return res.json(); })
       .then(function(data){
        productsData = data.users;
        genUI(productsData);
});
    </script>
</body>
</html>
