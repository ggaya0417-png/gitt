<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipes</title>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
}
.dark{
    background:#111;
    color:white;
}
table{
    width:100%;
    border-collapse:collapse;
    background:white;
}
.dark table{
    background:#222;
}
th,td{
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
}
th{
    background:#4f46e5;
    color:white;
    cursor:pointer;
}
.sorted{
    background:#fde68a;
}
.dark .sorted{
    background:#92400e;
}
.top{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
}
button{
    padding:6px 12px;
}
.pages{
    margin-top:10px;
    text-align:center;
}
.page{
    padding:5px 8px;
    border:1px solid #999;
    margin:2px;
    cursor:pointer;
}
.active{
    background:#4f46e5;
    color:white;
}
</style>
</head>

<body>

<div class="top">
<h3>Recipes</h3>
<button onclick="dark()">Dark</button>
</div>

<table>
<thead>
<tr>
<th onclick="Sort('name')">Name</th>
<th onclick="Sort('caloriesPerServing')">Calories</th>
<th onclick="Sort('cookTimeMinutes')">Cook</th>
<th onclick="Sort('prepTimeMinutes')">Prep</th>
<th onclick="Sort('rating')">Rating</th>
</tr>
</thead>
<tbody id="d2"></tbody>
</table>

<div class="pages" id="pages"></div>

<script>
var page=0
var limit=10
var recipesdata=[]
var sortedKey=""

function genUI(data){
    d2.innerHTML=""
    for(let i=0;i<data.length;i++){
        let e=data[i]
        d2.innerHTML+=`
        <tr>
            <td class="${sortedKey=='name'?'sorted':''}">${e.name}</td>
            <td class="${sortedKey=='caloriesPerServing'?'sorted':''}">${e.caloriesPerServing}</td>
            <td class="${sortedKey=='cookTimeMinutes'?'sorted':''}">${e.cookTimeMinutes}</td>
            <td class="${sortedKey=='prepTimeMinutes'?'sorted':''}">${e.prepTimeMinutes}</td>
            <td class="${sortedKey=='rating'?'sorted':''}">${e.rating}</td>
        </tr>`
    }
}

function Sort(key){
    sortedKey=key
    recipesdata.sort(function(a,b){
        if(typeof a[key]=="string"){
            return a[key].localeCompare(b[key])
        }
        return a[key]-b[key]
    })
    genUI(recipesdata)
}

function load(){
    fetch(`https://dummyjson.com/recipes?limit=${limit}&skip=${page*limit}`)
    .then(r=>r.json())
    .then(d=>{
        recipesdata=d.recipes
        genUI(recipesdata)
        pagesUI(d.total)
    })
}

function pagesUI(total){
    pages.innerHTML=""
    var count=Math.ceil(total/limit)
    for(let i=0;i<count;i++){
        pages.innerHTML+=`<span class="page ${i==page?'active':''}" onclick="go(${i})">${i+1}</span>`
    }
}

function go(p){
    page=p
    load()
}

function dark(){
    document.body.classList.toggle("dark")
}

load()
</script>

</body>
</html>
