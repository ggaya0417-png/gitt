<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
body{
    font-family: Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    color:white;
}

.scoreboard{
    background:#111;
    padding:20px;
    border-radius:15px;
    width:600px;
    text-align:center;
}

.teams{
    display:flex;
    justify-content:space-between;
    margin-top:20px;
}

.team{
    width:600px;
    background:#222;
    padding:15px;
    border-radius:10px;
}                   
.score{
    font-size:40px;
    margin:10px 0;
}

button{
    margin:5px;
    padding:5px 10px;
    cursor:pointer;
}

select,input{
    margin:5px;
    padding:5px;
}

#MatchTime{
    font-size:35px;
    color:yellow;
}

ul{
    text-align:left;
    max-height:150px;
    overflow:auto;
}
    </style>
</head>
<body>
    <div class="scoreboard">
        <h1>Football Match</h1>
        <h2 id="MatchTime">00:00</h2>
        <p id="match status">Match Not Started</p>
        <button onclick="startmatch()">Start Match</button>
        <button onclick="startExtraTime()">Start Extra Time</button>
        <button onclick="reset()">Reset</button>
        <div class="teams">
            <div class="team">
                <h2>Team A</h2>
                <p class="score" id="score1">0</p>
                <input type="text" id="newPlayer1" placeholder="Add Player">
                <button onclick="addplayer(1)">Add </button>
                <select id="players1">
                    <option value="">Select Player</option>
                </select>
                <button onclick="addgoal(1)">Goal</button>
                <button onclick="addcard(1,'Yellow')">Yellow</button>
                <button onclick="addcard(1,'Red')">Red</button>
                <p>🟨 <span id="yellow1">0</span> </t>| 🟥<span id="red1">0</span></p>
            </div>
           <div class="team">
                <h2>Team B</h2>
                <p class="score" id="score2">0</p>

               <input type="text" id="newPlayer2" placeholder="Add Player">
               <button onclick="addPlayer(2)">Add</button>

                <br>

                <select id="players2">
                <option value="">Select Player</option>
                </select>

                <br>

                <button onclick="addGoal(2)">Goal</button>
                <button onclick="addCard(2,'Yellow')">Yellow</button>
                <button onclick="addCard(2,'Red')">Red</button>

              <p>🟨 <span id="yellow2">0</span> </t> | 🟥 <span id="red2">0</span></p>
            </div>
           </div> 
           <h3>Match History</h3>
           <ul id="history"></ul>
        </div>
    </div>
    <script>
        let score1=0, score2=0;
let yellow1=0,yellow2=0;
let red1=0,red2=0;
let minutes=0;
let seconds=0;
let timer=null;
let half=1;
let isBreak=false;
let extraTime=false;

        function addPlayer(team){
            let input=document.getElementById("newPlayer"+team);
            let name=input.value;
            if(name==="") return alert("Enter player name");
            let option=document.createElement("option")
            option.value=name;
            option.innerText=name;
            document.getElementById("players"+team).appendChild(option);
            input.value="";

        }
        function startmatch(){
            if(timer!==null) return;
            document.getElementById("matchStatus").innerText="First Half";
        }
        function runtimer(){
            seconds++;
            if(seconds===60){
                minutes++;
                seconds=0;
            }
            updateDisplay();
            if(minutes===45&&half===1){
                clearInterval(timer);
                timer=null;
                startBreak();
            }
        }
        function startBreak(){
            isBreak=true;
            document.getElementById("matchStatus").innerText="Half Time Break";
            let breakTime=15;
            let breakTimer=setInterval(()=>{
breakTime--;
document.getElementById("matchTime").innerText="Break: "+breakTime;

if(breakTime===0){
clearInterval(breakTimer);
half=2;
isBreak=false;
document.getElementById("matchStatus").innerText="Second Half";
timer=setInterval(runTimer,1000);
}
},1000);
}
function startExtraTime(){
if(minutes<90){
alert("Match not finished yet");
return;
}
extraTime=true;
document.getElementById("matchStatus").innerText="Extra Time";
if(timer===null)
timer=setInterval(runTimer,1000);
}
        
        function addGoal(team){
        let select=document.getElementById("players"+team);
        let player=select.value;
        if(player==="") return alert("Select player");

        let timeText = minutes>=90 ? "90+"+(minutes-90)+"'" : minutes+"'";

        if(team===1){
        score1++;
        document.getElementById("score1").innerText=score1;
        }
       else{
       score2++;
       document.getElementById("score2").innerText=score2;
       }

       addHistory(timeText+" - "+player+" scored (Team "+team+")");
      }
      function addCard(team,type){

let select=document.getElementById("players"+team);
let player=select.value;
if(player==="") return alert("Select player");

if(team===1){
if(type==="Yellow"){yellow1++; document.getElementById("yellow1").innerText=yellow1;}
else{red1++; document.getElementById("red1").innerText=red1;}
}
else{
if(type==="Yellow"){yellow2++; document.getElementById("yellow2").innerText=yellow2;}
else{red2++; document.getElementById("red2").innerText=red2;}
}

let timeText = minutes>=90 ? "90+"+(minutes-90)+"'" : minutes+"'";

addHistory(timeText+" - "+player+" got "+type+" Card (Team "+team+")");
}
      function addHistory(text){
let li=document.createElement("li");
li.innerText=text;
document.getElementById("history").appendChild(li);
}
function addCard(team,color){
let select=document.getElementById("players"+team);
let player=select.value;
if(player==="") return alert("Select player");

let timeText = minutes>=90 ? "90+"+(minutes-90)+"'" : minutes+"'";

if(color==="yellow"){
if(team===1){
yellow1++;
}
else{
yellow2++;
}
}
else{
if(team===1){
red1++;
}
else{
red2++;
}
}

addHistory(timeText+" - "+player+" got a "+color+" card (Team "+team+")");
}
function resetMatch(){
clearInterval(timer);
timer=null;

score1=score2=0;
yellow1=yellow2=0;
red1=red2=0;
minutes=seconds=0;
half=1;
extraTime=false;

document.getElementById("score1").innerText=0;
document.getElementById("score2").innerText=0;
document.getElementById("yellow1").innerText=0;
document.getElementById("yellow2").innerText=0;
document.getElementById("red1").innerText=0;
document.getElementById("red2").innerText=0;
document.getElementById("history").innerHTML="";
document.getElementById("matchTime").innerText="00:00";
document.getElementById("matchStatus").innerText="Not Started";
}

    </script>
</body>
</html>
